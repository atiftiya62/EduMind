<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduMind</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <!-- If style.css is inside css folder use: ./css/style.css -->
    <link rel="stylesheet" href="./style.css" />

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@latest/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <div class="container">
      <!-- Sidebar -->
      <nav class="sidebar">
        <h2>EduMind</h2>

        <ul>
          <li><a href="#" onclick="showPage('home')">Home</a></li>
          <li><a href="#" onclick="showPage('learn')">Learn</a></li>
          <li><a href="#" onclick="showPage('notes')">Notes</a></li>
          <li><a href="#" onclick="showPage('flashcard')">Flashcards</a></li>
          <li><a href="#" onclick="showPage('quiz')">Quiz</a></li>
          <li><a href="#" onclick="showPage('diagram')">Diagram</a></li>
          <li><a href="#" onclick="showPage('pomodoro')">Pomodoro</a></li>
          <li><a href="#" onclick="showPage('progress')">Progress</a></li>
        </ul>
      </nav>

      <!-- Main Content -->
      <main class="main-content">
        <!-- HOME -->
        <section id="home" class="page">
          <h1>Welcome to EduMind</h1>
          <p>Your all-in-one educational platform.</p>
        </section>

        <!-- LEARN -->
        <section id="learn" class="page" style="display: none">
          <h1>Learn</h1>
          <div id="learn-content"></div>
        </section>

        <!-- NOTES -->
        <section id="notes" class="page" style="display: none">
          <h1>Notes</h1>
          <div id="notes-content"></div>
        </section>

        <!-- FLASHCARDS -->
        <section id="flashcard" class="page" style="display: none">
          <h1>Flashcards</h1>
          <div id="flashcard-content"></div>
        </section>

        <!-- QUIZ -->
        <section id="quiz" class="page" style="display: none">
          <h1>Quiz</h1>
          <div id="quiz-content"></div>
        </section>

        <!-- DIAGRAM -->
        <section id="diagram" class="page" style="display: none">
          <h1>Diagram</h1>
          <div id="diagram-content"></div>
        </section>

        <!-- POMODORO -->
        <section id="pomodoro" class="page" style="display: none">
          <h1>Pomodoro</h1>
          <div id="pomodoro-content"></div>
        </section>

        <!-- PROGRESS -->
        <section id="progress" class="page" style="display: none">
          <h1>Progress</h1>
          <div id="progress-content"></div>
        </section>
      </main>
    </div>

    <!-- FEATURE FILES -->
    <script src="./learn.js"></script>
    <script src="./notes.js"></script>
    <script src="./flashcard.js"></script>
    <script src="./quiz.js"></script>
    <script src="./diagram.js"></script>
    <script src="./pomodoro.js"></script>
    <script src="./progress.js"></script>

    <!-- MAIN SCRIPT -->
    <script src="./Script.js"></script>
  </body>
</html>
